# fly.toml app configuration file generated for lux-openbench on 2026-04-08T19:30:02-04:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'lux-openbench'
primary_region = 'iad'
console_command = '/code/manage.py shell'

[build]

[env]
  PORT = '8000'

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

[[vm]]
  memory = '256mb'
  cpus = 1
  memory_mb = 256

[[statics]]
  guest_path = '/code/staticfiles'
  url_prefix = '/static/'

[[mounts]]
  source = 'openbench_data'
  destination = '/code/data'
